<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <!-- Meta para que se ajuste perfectamente a cualquier pantalla móvil -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Enlace al manifiesto para instalación -->
    <link rel="mani" href="mani.json">
    <meta name="theme-color" content="#0056b3">
    <title>Inventario Tienda - Ayber</title>
    <style>
        :root {
            --azul: #0056b3;
            --verde: #28a745;
            --texto: #212529;
            --fondo: #f8f9fa;
        }

        /* Asegura que nada se salga de los bordes del celular */
        * { box-sizing: border-box; }

        body { 
            font-family: Arial, sans-serif; 
            background-color: var(--fondo); 
            margin: 0; padding: 10px; 
            color: var(--texto);
            overscroll-behavior: contain;
        }

        .container { width: 100%; max-width: 450px; margin: auto; }
        
        header { 
            background: white; 
            padding: 15px; 
            border-radius: 12px; 
            text-align: center; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 15px;
        }

        #fecha { font-size: 1rem; color: var(--azul); font-weight: bold; text-transform: capitalize; }
        h2 { margin: 5px 0; font-size: 1.5rem; }

        .search-container { margin-bottom: 15px; }
        #search-box {
            width: 100%; padding: 15px; border: 3px solid var(--azul); border-radius: 12px;
            font-size: 1.1rem; box-sizing: border-box; outline: none;
            -webkit-appearance: none; /* Mejor visualización en iPhone */
        }

        .product-card { 
            background: white; padding: 15px; border-radius: 15px; 
            margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border-left: 8px solid var(--azul);
        }

        .product-name { 
            font-size: 1.3rem; font-weight: bold; 
            display: block; margin-bottom: 10px; text-transform: uppercase;
        }

        .status-bar {
            background: #e9ecef; padding: 8px; border-radius: 8px;
            font-size: 0.95rem; margin-bottom: 12px; font-weight: bold;
        }

        .input-row { display: flex; gap: 15px; }
        .input-field { flex: 1; }
        .input-field label { display: block; font-size: 0.9rem; margin-bottom: 5px; color: #555; }
        
        input[type="number"] {
            width: 100%; padding: 12px; border: 2px solid #ced4da; border-radius: 10px;
            font-size: 1.2rem; box-sizing: border-box; text-align: center;
        }

        button#save-btn {
            width: 100%; padding: 20px; background-color: var(--verde);
            color: white; border: none; border-radius: 15px; font-weight: bold; 
            font-size: 1.4rem; cursor: pointer; position: sticky; bottom: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            z-index: 100;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div id="fecha">Cargando fecha...</div>
        <h2>Anotar Inventario</h2>
    </header>

    <div class="search-container">
        <input type="text" id="search-box" placeholder="🔎 Escriba el nombre del producto..." onkeyup="filtrarProductos()">
    </div>

    <div id="product-list"></div>

    <button id="save-btn" onclick="guardarTodo()">✅ GUARDAR TODO</button>
</div>

<script>
    // Registro de Service Worker para que sea instalable
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sv.js').catch(err => console.log("SV no registrado", err));
    }

    let productos = [
        { nombre: "Agua" }, { nombre: "Cancha" }, { nombre: "Chizito" },
        { nombre: "Chizito sin picante" }, { nombre: "Chistris" },
        { nombre: "Cuates" }, { nombre: "Cuates tornillo" },
        { nombre: "Galleta soda" }, { nombre: "Galleta vainilla" },
        { nombre: "Gaseosa" }, { nombre: "Gelatina" }, { nombre: "Hot Dog" }
    ];

    productos.sort((a, b) => a.nombre.localeCompare(b.nombre));

    function actualizarFecha() {
        const d = new Date();
        const opciones = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('fecha').innerText = d.toLocaleDateString('es-ES', opciones);
    }

    function initApp() {
        actualizarFecha();
        const container = document.getElementById('product-list');
        productos.forEach(p => {
            const id = p.nombre.replace(/\s+/g, '-').toLowerCase();
            const card = document.createElement('div');
            card.className = 'product-card';
            card.setAttribute('data-name', p.nombre);
            card.innerHTML = `
                <span class="product-name">${p.nombre}</span>
                <div class="status-bar">Hay guardado: <span id="display-${id}">0 Pq y 0 Un</span></div>
                <div class="input-row">
                    <div class="input-field"><label>Paquetes</label><input type="number" id="p-${id}" placeholder="0" onfocus="this.select()"></div>
                    <div class="input-field"><label>Unidades</label><input type="number" id="u-${id}" placeholder="0" onfocus="this.select()"></div>
                </div>
            `;
            container.appendChild(card);
        });
        cargarDatos();
    }

    function filtrarProductos() {
        const busqueda = document.getElementById('search-box').value.toLowerCase();
        const cards = document.getElementsByClassName('product-card');
        for (let card of cards) {
            const nombre = card.getAttribute('data-name').toLowerCase();
            card.style.display = nombre.includes(busqueda) ? "block" : "none";
        }
    }

    function guardarTodo() {
        productos.forEach(p => {
            const id = p.nombre.replace(/\s+/g, '-').toLowerCase();
            const pVal = document.getElementById(`p-${id}`).value || 0;
            const uVal = document.getElementById(`u-${id}`).value || 0;
            document.getElementById(`display-${id}`).innerText = `${pVal} Pq y ${uVal} Unidades`;
            localStorage.setItem(`p-${id}`, pVal);
            localStorage.setItem(`u-${id}`, uVal);
        });
        const btn = document.getElementById('save-btn');
        btn.innerText = "¡GUARDADO CON ÉXITO!";
        btn.style.backgroundColor = "#0056b3";
        setTimeout(() => {
            btn.innerText = "✅ GUARDAR TODO";
            btn.style.backgroundColor = "#28a745";
        }, 2000);
    }

    function cargarDatos() {
        productos.forEach(p => {
            const id = p.nombre.replace(/\s+/g, '-').toLowerCase();
            const pRes = localStorage.getItem(`p-${id}`) || 0;
            const uRes = localStorage.getItem(`u-${id}`) || 0;
            document.getElementById(`p-${id}`).value = pRes;
            document.getElementById(`u-${id}`).value = uRes;
            document.getElementById(`display-${id}`).innerText = `${pRes} Pq y ${uRes} Unidades`;
        });
    }

    window.onload = initApp;
</script>
</body>
</html>
